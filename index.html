<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compass</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="brand">
        <h1>Compass</h1>
        <p class="subtitle">Describe what’s going on, and we’ll help you find the right support.</p>
      </div>

     <div class="nav">
  <a class="navLink" href="index.html">Home</a>
  <a class="navLink" href="emergency.html">Emergency</a>

  <button class="themeToggle" id="themeToggle" type="button" onclick="toggleTheme()">
    <span class="toggleIcon" aria-hidden="true">🌙</span>
    <span class="toggleText">Dark</span>
  </button>
</div>
    </div>

    <div class="grid">
      <!-- LEFT (BIG): Guidance -->
      <div class="panel panel-main">
        <h2>Get guidance</h2>
        <p class="muted">Use plain language. Example: “I’m overwhelmed with classes and can’t focus.”</p>

        <label class="muted" for="campusSelect" style="display:block; margin-top:10px;">
          Choose your campus (optional):
        </label>

        <select id="campusSelect" class="searchBox" onchange="renderCampusHint()">
          <option value="">No campus selected</option>
          <option value="rutgers_nb">Rutgers — New Brunswick</option>
          <option value="rutgers_nk">Rutgers — Newark</option>
          <option value="nyu">NYU</option>
        </select>

        <input 
          id="campusSearch" 
          class="searchBox" 
          style="margin-top:8px;" 
          placeholder="Or search your school (any U.S. university)" 
          oninput="handleCampusSearch()"
        />

        <p id="campusHint" class="muted" style="margin-top:8px;"></p>

        <textarea id="inputBox" placeholder="What’s going on?"></textarea>

        <div class="row">
          <button onclick="analyze()">Get Guidance</button>
          <button class="smallBtn" onclick="clearInput()">Clear</button>
        </div>

        <div id="output" class="output"></div>
      </div>

      <!-- RIGHT: Saved chats -->
      <div class="panel panel-side">
        <h2>Saved chats</h2>
        <input
          id="searchBox"
          class="searchBox"
          placeholder="Search chats (ex: anxiety, tutoring, money)…"
          oninput="renderChatHistory()"
        />

        <p class="muted" style="margin-top:10px;">
          Click a chat to reopen the recommendations.
        </p>

        <div class="row">
          <button class="smallBtn" onclick="exportChats()">Export</button>
          <button class="smallBtn" onclick="deleteAllChats()">Delete all</button>
        </div>

        <div id="history"></div>
      </div>
    </div>
  </div>

  <script src="campuses.js"></script>
  <script src="script.js"></script>
</body>
</html>
